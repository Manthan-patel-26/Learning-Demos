# ============================================================
# DOCKER COMPOSE — Development (hot reload, no optimization)
# ============================================================
# docker compose -f docker-compose.dev.yml up --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ecommerce_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # Backend: run with ts-node for hot reload (no build step)
  backend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://postgres:password@postgres:5432/ecommerce_db
      REDIS_URL: redis://redis:6379
    volumes:
      # Mount source code — changes are reflected immediately
      - ./backend:/app
      # IMPORTANT: Don't mount node_modules from host!
      # The container's architecture may differ from host (arm vs x86).
      # Use an anonymous volume to "mask" the host node_modules.
      - /app/node_modules
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm start"
    environment:
      - CHOKIDAR_USEPOLLING=true # Required for hot reload inside Docker on macOS
      - REACT_APP_API_URL=http://localhost:3001
    volumes:
      - ./frontend:/app
      - /app/node_modules # Same node_modules trick
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_dev_data:
