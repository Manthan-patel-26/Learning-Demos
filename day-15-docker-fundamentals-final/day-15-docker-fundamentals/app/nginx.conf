server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip Compression ─────────────────────────────────
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── Security Headers ──────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # ── React SPA Routing ─────────────────────────────────
    # Without this: refreshing /products/123 returns 404
    # With this: nginx serves index.html for unknown routes (React Router handles it)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static Assets: Long Cache ─────────────────────────
    # React creates hashed filenames (main.abc123.js).
    # The hash changes when content changes — safe to cache forever.
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Health Check Endpoint ─────────────────────────────
    location /health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }
}
