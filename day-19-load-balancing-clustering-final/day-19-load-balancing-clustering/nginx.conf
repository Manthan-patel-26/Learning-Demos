# ============================================================
# NGINX LOAD BALANCER CONFIGURATION
# ============================================================
# Distributes traffic across 3 Node.js instances running on
# ports 3001, 3002, 3003.
#
# Install nginx: brew install nginx (Mac) or apt install nginx
# Test config:   nginx -t
# Start:         nginx -c /path/to/this/nginx.conf
# Reload:        nginx -s reload (zero-downtime)
# Stop:          nginx -s stop

events {
    worker_connections 1024;  # Max simultaneous connections per nginx worker
}

http {

    # ── Upstream block: defines the pool of backend servers ──
    upstream node_backends {
        # Load balancing strategy:
        # (default) round-robin: requests distributed in order 1,2,3,1,2,3...
        # ip_hash:   sticky sessions — same client always goes to same backend
        # least_conn: send to server with fewest active connections (best for long requests)
        # random:    random selection

        least_conn;   # Best for APIs with varying response times

        server 127.0.0.1:3001;  # Node instance 1
        server 127.0.0.1:3002;  # Node instance 2
        server 127.0.0.1:3003;  # Node instance 3

        # Health check: mark server as down if it fails 3 times in 30s
        # (requires nginx Plus for active health checks)
        # server 127.0.0.1:3001 max_fails=3 fail_timeout=30s;

        # Keepalive connections to backends (reduces TCP overhead)
        keepalive 32;
    }

    server {
        listen 80;
        server_name localhost;

        # ── Proxy to backend cluster ──────────────────────
        location /api/ {
            proxy_pass http://node_backends;

            # Forward original client IP (so Node.js sees real IP for rate limiting)
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;

            # Retry on failure (fail over to next backend)
            proxy_next_upstream error timeout http_502 http_503;
        }

        # ── Health check endpoint ─────────────────────────
        location /health {
            proxy_pass http://node_backends;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Serve React frontend ──────────────────────────
        location / {
            root /var/www/html;
            try_files $uri $uri/ /index.html;
        }
    }
}
