<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day 28 — Image Optimization & Lazy Loading</title>
    <!--
      FONT LOADING STRATEGY:
      - font-display: swap  → show fallback font instantly, swap when loaded (avoids FOIT)
      - preconnect          → warms up the DNS/TCP connection to the font server early
      - This prevents the "invisible text" flash (FOIT = Flash Of Invisible Text)

      For self-hosted fonts, use font-display: optional instead to avoid any layout shift.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
